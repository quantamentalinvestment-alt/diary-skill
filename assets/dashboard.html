<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Diary</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #2c1810, #3d2317, #1a1a2e);
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f5f0eb;
      --text-dim: rgba(245, 240, 235, 0.5);
      --text-muted: rgba(245, 240, 235, 0.35);
      --accent-primary: #c9a87c;
      --accent-secondary: #a67c52;
      --accent-warm: #d4956a;
      --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      --font-serif: 'Lora', Georgia, serif;
      --font-sans: 'Inter', -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      font-family: var(--font-sans);
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--glass-border);
    }

    h1 {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: 2rem;
      letter-spacing: -0.3px;
      background: linear-gradient(to right, var(--accent-primary), var(--accent-warm));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-dim);
      font-weight: 300;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 24px;
      box-shadow: var(--card-shadow);
      transition: border-color 0.3s;
    }

    .search-bar:focus-within { border-color: var(--accent-primary); }

    .search-bar svg {
      width: 18px;
      height: 18px;
      color: var(--text-dim);
      margin-right: 10px;
      flex-shrink: 0;
    }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 300;
    }

    .search-bar input::placeholder { color: var(--text-muted); }

    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      flex: 1;
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      box-shadow: var(--card-shadow);
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent-primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .month-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .month-pill {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .month-pill:hover, .month-pill.active {
      background: rgba(201, 168, 124, 0.15);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .tag-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tag-pill {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag-pill:hover, .tag-pill.active {
      background: rgba(201, 168, 124, 0.15);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .entry-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .entry-card {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--card-shadow);
      cursor: pointer;
      transition: all 0.3s;
      animation: slideIn 0.4s ease-out;
    }

    .entry-card:hover {
      border-color: rgba(201, 168, 124, 0.3);
      transform: translateY(-2px);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .entry-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .entry-delete {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
      opacity: 0;
    }

    .entry-card:hover .entry-delete { opacity: 1; }
    .entry-delete:hover { color: #ff6b6b; }
    .entry-delete svg { width: 16px; height: 16px; }

    .entry-title {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .entry-preview {
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.6;
      font-weight: 300;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .entry-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .entry-tag {
      font-size: 0.68rem;
      color: var(--accent-secondary);
      background: rgba(166, 124, 82, 0.1);
      padding: 3px 8px;
      border-radius: 8px;
    }

    .entry-photos {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .entry-photo {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .entry-photo:hover {
      transform: scale(1.05);
    }

    .entry-card.expanded .entry-photo {
      width: 100%;
      height: auto;
      max-height: 300px;
      object-fit: contain;
    }

    .entry-photo-count {
      font-size: 0.68rem;
      color: var(--accent-secondary);
      background: rgba(166, 124, 82, 0.1);
      padding: 3px 8px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .entry-card.expanded .entry-photo-count {
      display: none;
    }

    .add-photo-btn {
      display: none;
      background: rgba(201, 168, 124, 0.15);
      border: 1px dashed var(--accent-primary);
      color: var(--accent-primary);
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: var(--font-sans);
      margin-top: 12px;
      transition: all 0.2s;
      width: 100%;
      text-align: center;
    }

    .add-photo-btn:hover {
      background: rgba(201, 168, 124, 0.25);
    }

    .entry-card.expanded .add-photo-btn {
      display: block;
    }

    .entry-card.expanded .entry-preview {
      -webkit-line-clamp: unset;
      color: var(--text-main);
      font-family: var(--font-serif);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .entry-card.expanded { cursor: default; }
    .entry-card.expanded .entry-delete { opacity: 1; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-dim);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 0.95rem;
      font-weight: 300;
    }

    .raw-data-section {
      margin-top: 32px;
      text-align: center;
    }

    .raw-data-toggle {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: var(--font-sans);
      transition: all 0.2s;
    }

    .raw-data-toggle:hover {
      border-color: var(--accent-primary);
      color: var(--text-dim);
    }

    .raw-data-container {
      display: none;
      margin-top: 16px;
      text-align: left;
      background: rgba(0, 0, 0, 0.3);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      overflow-x: auto;
      position: relative;
    }

    .raw-data-container pre {
      font-family: monospace;
      font-size: 0.7rem;
      color: var(--accent-primary);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--accent-primary);
      border: none;
      color: #1a1a2e;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      font-family: var(--font-sans);
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>My Diary</h1>
      <div class="subtitle">Your private thoughts, safely stored</div>
    </header>

    <div class="search-bar">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" id="search-input" placeholder="Search your entries...">
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="total-entries">0</div>
        <div class="stat-label">Total Entries</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-tags">0</div>
        <div class="stat-label">Tags</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
    </div>

    <div class="month-filter" id="month-filter"></div>
    <div class="tag-filter" id="tag-filter"></div>
    <div class="entry-list" id="entry-list"></div>

    <div class="raw-data-section">
      <button class="raw-data-toggle" id="raw-data-toggle">View Raw Data</button>
      <div class="raw-data-container" id="raw-data-container">
        <button class="copy-btn" id="copy-btn">Copy</button>
        <pre id="raw-json"></pre>
      </div>
    </div>
  </div>

  <!-- Photo Modal -->
  <div id="photo-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;justify-content:center;align-items:center;cursor:pointer;" onclick="closePhotoModal()">
    <img id="modal-img" style="max-width:90%;max-height:90%;object-fit:contain;border-radius:8px;">
  </div>

  <!-- Hidden File Input for Photo Picker -->
  <input type="file" id="photo-input" accept="image/*" style="display:none;" onchange="handlePhotoSelect(event)">

  <script>
    const DB_NAME = 'diary_private_writing_db';
    const DB_VERSION = 1;
    const STORE_NAME = 'entries';

    let allEntries = {};
    let activeTag = null;
    let activeMonth = null;
    let searchQuery = '';
    let expandedDate = null;

    const urlParams = new URLSearchParams(window.location.search);
    const daysToShow = parseInt(urlParams.get('days')) || 30;

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'date' });
          }
        };
        request.onsuccess = (event) => resolve(event.target.result);
        request.onerror = (event) => reject(event.target.error);
      });
    }

    async function loadAllEntries() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        request.onsuccess = () => {
          const entries = {};
          request.result.forEach(entry => { entries[entry.date] = entry; });
          resolve(entries);
        };
        request.onerror = () => reject(request.error);
      });
    }

    async function deleteEntryDB(date) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.delete(date);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    async function loadData() {
      allEntries = await loadAllEntries();
      renderAll();
    }

    function renderAll() {
      renderStats();
      renderMonthFilter();
      renderTags();
      renderEntries();
      document.getElementById('raw-json').textContent = JSON.stringify(allEntries, null, 2);
    }

    function renderStats() {
      try {
        const entries = Object.values(allEntries);
        document.getElementById('total-entries').textContent = entries.length;
        const allTags = new Set();
        entries.forEach(e => {
          if (e.tags) e.tags.forEach(t => allTags.add(t));
        });
        document.getElementById('total-tags').textContent = allTags.size;
        document.getElementById('streak').textContent = calcStreak();
      } catch (e) {
        console.error('renderStats error:', e);
      }
    }

    function calcStreak() {
      try {
        const dates = Object.keys(allEntries).sort().reverse();
        if (dates.length === 0) return 0;
        let streak = 0;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        let checkDate = new Date(today);
        for (let i = 0; i < dates.length + 1; i++) {
          const iso = checkDate.toISOString().split('T')[0];
          if (dates.includes(iso)) {
            streak++;
            checkDate.setDate(checkDate.getDate() - 1);
          } else {
            break;
          }
        }
        return streak;
      } catch (e) {
        console.error('calcStreak error:', e);
        return 0;
      }
    }

    function renderMonthFilter() {
      const months = new Set();
      Object.keys(allEntries).forEach(date => {
        months.add(date.substring(0, 7));
      });
      const container = document.getElementById('month-filter');
      const sortedMonths = Array.from(months).sort().reverse();
      if (sortedMonths.length <= 1) {
        container.innerHTML = '';
        return;
      }
      let html = `<div class="month-pill ${!activeMonth ? 'active' : ''}" onclick="filterMonth(null)">All</div>`;
      sortedMonths.forEach(m => {
        const [year, month] = m.split('-');
        const label = new Date(year, parseInt(month) - 1).toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
        html += `<div class="month-pill ${activeMonth === m ? 'active' : ''}" onclick="filterMonth('${m}')">${label}</div>`;
      });
      container.innerHTML = html;
    }

    function filterMonth(month) {
      activeMonth = month;
      renderMonthFilter();
      renderEntries();
    }

    function renderTags() {
      const allTags = new Set();
      Object.values(allEntries).forEach(e => {
        if (e.tags) e.tags.forEach(t => allTags.add(t));
      });
      const container = document.getElementById('tag-filter');
      const sortedTags = Array.from(allTags).sort();
      if (sortedTags.length === 0) {
        container.innerHTML = '';
        return;
      }
      let html = `<div class="tag-pill ${!activeTag ? 'active' : ''}" onclick="filterTag(null)">All</div>`;
      sortedTags.forEach(tag => {
        html += `<div class="tag-pill ${activeTag === tag ? 'active' : ''}" onclick="filterTag('${tag}')">${tag}</div>`;
      });
      container.innerHTML = html;
    }

    function filterTag(tag) {
      activeTag = tag;
      renderTags();
      renderEntries();
    }

    function getFilteredEntries() {
      let entries = Object.entries(allEntries)
        .map(([date, entry]) => ({ date, ...entry }))
        .sort((a, b) => b.date.localeCompare(a.date));

      if (activeMonth) {
        entries = entries.filter(e => e.date.startsWith(activeMonth));
      }

      if (activeTag) {
        entries = entries.filter(e => e.tags && e.tags.includes(activeTag));
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        entries = entries.filter(e =>
          e.content.toLowerCase().includes(q) ||
          e.title.toLowerCase().includes(q) ||
          (e.tags && e.tags.some(t => t.toLowerCase().includes(q)))
        );
      }

      return entries.slice(0, daysToShow);
    }

    function renderEntries() {
      const container = document.getElementById('entry-list');
      const entries = getFilteredEntries();

      if (entries.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            <p>${searchQuery ? 'No entries match your search.' : 'Your diary is empty. Start writing!'}</p>
          </div>
        `;
        return;
      }

      container.innerHTML = entries.map((entry, i) => {
        const isExpanded = expandedDate === entry.date;
        const dateObj = new Date(entry.date + 'T00:00:00');
        const dateDisplay = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

        const tagsHtml = entry.tags && entry.tags.length > 0
          ? `<div class="entry-tags">${entry.tags.map(t => `<span class="entry-tag">${t}</span>`).join('')}</div>`
          : '';

        const photosHtml = entry.photos && entry.photos.length > 0
          ? `<div class="entry-photos">${entry.photos.map((p, idx) => `<img src="${p}" class="entry-photo" onclick="event.stopPropagation(); openPhoto('${entry.date}', ${idx})" alt="Photo ${idx + 1}">`).join('')}</div>`
          : '';

        const photoCountHtml = entry.photos && entry.photos.length > 0 && !isExpanded
          ? `<span class="entry-photo-count">📷 ${entry.photos.length}</span>`
          : '';

        const addPhotoBtnHtml = `
          <button class="add-photo-btn" onclick="event.stopPropagation(); triggerPhotoPicker('${entry.date}')">
            + Add Photo from Library
          </button>
        `;

        const deleteHtml = `
          <button class="entry-delete" onclick="event.stopPropagation(); deleteEntry('${entry.date}')" title="Delete entry">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
        `;

        return `
          <div class="entry-card ${isExpanded ? 'expanded' : ''}" onclick="toggleEntry('${entry.date}')" style="animation-delay: ${i * 0.05}s">
            <div class="entry-header">
              <span class="entry-date">${dateDisplay} ${photoCountHtml}</span>
              ${deleteHtml}
            </div>
            <div class="entry-title">${escapeHtml(entry.title)}</div>
            <div class="entry-preview">${escapeHtml(entry.content)}</div>
            ${tagsHtml}
            ${photosHtml}
            ${addPhotoBtnHtml}
          </div>
        `;
      }).join('');
    }

    function toggleEntry(date) {
      expandedDate = expandedDate === date ? null : date;
      renderEntries();
    }

    async function deleteEntry(date) {
      if (confirm(`Delete entry from ${date}?`)) {
        await deleteEntryDB(date);
        delete allEntries[date];
        if (expandedDate === date) expandedDate = null;
        renderAll();
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function openPhoto(date, photoIndex) {
      const entry = allEntries[date];
      if (!entry || !entry.photos || !entry.photos[photoIndex]) return;
      const photo = entry.photos[photoIndex];
      const modal = document.getElementById('photo-modal');
      const modalImg = document.getElementById('modal-img');
      modalImg.src = photo;
      modal.style.display = 'flex';
    }

    function closePhotoModal() {
      document.getElementById('photo-modal').style.display = 'none';
    }

    let pendingPhotoDate = null;

    function triggerPhotoPicker(date) {
      pendingPhotoDate = date;
      document.getElementById('photo-input').click();
    }

    async function handlePhotoSelect(event) {
      const file = event.target.files[0];
      const date = pendingPhotoDate;
      event.target.value = '';
      pendingPhotoDate = null;
      
      if (!file || !date) return;

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const base64Photo = e.target.result;
          const entry = allEntries[date];
          if (!entry) {
            alert('Entry not found. Please create the diary entry first.');
            return;
          }
          if (!entry.photos) entry.photos = [];
          entry.photos.push(base64Photo);
          entry.updatedAt = new Date().toISOString();

          const db = await openDB();
          await new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            const request = store.put(entry);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
          });

          allEntries[date] = entry;
          renderAll();
        } catch (err) {
          console.error('Failed to save photo:', err);
          alert('Failed to save photo. Please try again.');
        }
      };
      reader.readAsDataURL(file);
    }

    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = e.target.value.trim();
        renderEntries();
      }, 300);
    });

    document.getElementById('raw-data-toggle').addEventListener('click', () => {
      const container = document.getElementById('raw-data-container');
      const isHidden = container.style.display === 'none';
      container.style.display = isHidden ? 'block' : 'none';
      document.getElementById('raw-data-toggle').textContent = isHidden ? 'Hide Raw Data' : 'View Raw Data';
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
      const rawJson = document.getElementById('raw-json').textContent;
      navigator.clipboard.writeText(rawJson).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
      });
    });

    loadData();
  </script>
</body>
</html>
