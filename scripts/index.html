<!DOCTYPE html>
<html lang="en">
<body>
  <script>
    const DB_NAME = 'diary_private_writing_db';
    const DB_VERSION = 1;
    const STORE_NAME = 'entries';

    const toLocalISO = (d) => {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    function resolveDate(dateStr) {
      const now = new Date();
      if (!dateStr || dateStr.toLowerCase() === 'today') return toLocalISO(now);
      const lower = dateStr.toLowerCase();
      if (lower === 'yesterday') {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        return toLocalISO(d);
      }
      if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
      const parsed = new Date(dateStr);
      if (!isNaN(parsed.getTime())) return toLocalISO(parsed);
      return toLocalISO(now);
    }

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'date' });
          }
        };
        request.onsuccess = (event) => resolve(event.target.result);
        request.onerror = (event) => reject(event.target.error);
      });
    }

    async function getAllEntries() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        request.onsuccess = () => {
          const entries = {};
          request.result.forEach(entry => { entries[entry.date] = entry; });
          resolve(entries);
        };
        request.onerror = () => reject(request.error);
      });
    }

    async function putEntry(entry) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.put(entry);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    async function deleteEntryDB(date) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.delete(date);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    async function clearAllEntries() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.clear();
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    async function exportAllEntries() {
      const entries = await getAllEntries();
      return JSON.stringify(entries, null, 2);
    }

    window['ai_edge_gallery_get_result'] = async (dataStr) => {
      try {
        const input = JSON.parse(dataStr);
        const action = input.action;
        let resultMessage = "";
        let showDashboard = false;
        let dashboardDays = 30;

        if (action === 'write_entry') {
          const date = resolveDate(input.date);
          const title = input.title || `Entry for ${date}`;
          const content = input.content;
          if (!content) throw new Error("No content provided for the diary entry.");
          const tags = input.tags || [];
          const photos = input.photos || [];
          const allData = await getAllEntries();
          const existing = allData[date];
          await putEntry({
            date: date,
            title: title,
            content: content,
            tags: tags,
            photos: photos,
            updatedAt: new Date().toISOString(),
            createdAt: existing ? existing.createdAt : new Date().toISOString()
          });
          resultMessage = `Saved your diary entry for ${date}: "${title}".`;
          if (photos.length > 0) {
            resultMessage += ` (${photos.length} photo${photos.length > 1 ? 's' : ''} attached)`;
          }

        } else if (action === 'attach_photo') {
          const date = resolveDate(input.date);
          const photo = input.photo;
          if (!photo) throw new Error("No photo data provided.");
          const allData = await getAllEntries();
          const entry = allData[date];
          if (!entry) {
            resultMessage = `No diary entry found for ${date}. Create an entry first before attaching photos.`;
          } else {
            if (!entry.photos) entry.photos = [];
            entry.photos.push(photo);
            entry.updatedAt = new Date().toISOString();
            await putEntry(entry);
            resultMessage = `Photo attached to entry for ${date}. (${entry.photos.length} photo${entry.photos.length > 1 ? 's' : ''} total)`;
          }

        } else if (action === 'read_entry') {
          const date = resolveDate(input.date);
          const allData = await getAllEntries();
          const entry = allData[date];
          if (entry) {
            resultMessage = `--- ${entry.title} (${date}) ---\n\n${entry.content}`;
            if (entry.tags && entry.tags.length > 0) {
              resultMessage += `\n\nTags: ${entry.tags.join(', ')}`;
            }
            if (entry.photos && entry.photos.length > 0) {
              resultMessage += `\n\n[${entry.photos.length} photo${entry.photos.length > 1 ? 's' : ''} attached]`;
            }
          } else {
            resultMessage = `No diary entry found for ${date}. Would you like to write one?`;
          }

        } else if (action === 'list_entries') {
          const count = parseInt(input.count) || 10;
          const allData = await getAllEntries();
          const sortedDates = Object.keys(allData).sort().reverse().slice(0, count);
          if (sortedDates.length === 0) {
            resultMessage = "Your diary is empty. Start writing to capture your thoughts!";
          } else {
            resultMessage = `Here are your ${sortedDates.length} most recent entries:\n\n`;
            sortedDates.forEach(d => {
              const entry = allData[d];
              const preview = entry.content.substring(0, 80) + (entry.content.length > 80 ? '...' : '');
              resultMessage += `- **${d}** — ${entry.title}\n  "${preview}"\n\n`;
            });
          }

        } else if (action === 'search_entries') {
          const query = (input.query || '').toLowerCase();
          const count = parseInt(input.count) || 10;
          if (!query) throw new Error("No search query provided.");
          const allData = await getAllEntries();
          const results = [];
          const sortedDates = Object.keys(allData).sort().reverse();
          for (const d of sortedDates) {
            const entry = allData[d];
            const matchesContent = entry.content.toLowerCase().includes(query);
            const matchesTitle = entry.title.toLowerCase().includes(query);
            const matchesTags = entry.tags && entry.tags.some(t => t.toLowerCase().includes(query));
            if (matchesContent || matchesTitle || matchesTags) {
              results.push({ date: d, ...entry });
              if (results.length >= count) break;
            }
          }
          if (results.length === 0) {
            resultMessage = `No entries found matching "${query}".`;
          } else {
            resultMessage = `Found ${results.length} entr${results.length === 1 ? 'y' : 'ies'} matching "${query}":\n\n`;
            results.forEach(r => {
              const preview = r.content.substring(0, 100) + (r.content.length > 100 ? '...' : '');
              resultMessage += `- **${r.date}** — ${r.title}\n  "${preview}"\n\n`;
            });
          }

        } else if (action === 'show_dashboard') {
          showDashboard = true;
          dashboardDays = parseInt(input.days) || 30;
          const allData = await getAllEntries();
          const sortedDates = Object.keys(allData).sort().reverse().slice(0, dashboardDays);
          if (sortedDates.length === 0) {
            resultMessage = "Your diary is empty. Start writing to capture your thoughts!";
          } else {
            resultMessage = `Here are your ${sortedDates.length} most recent entries:`;
          }

        } else if (action === 'delete_entry') {
          const date = resolveDate(input.date);
          const allData = await getAllEntries();
          if (allData[date]) {
            const title = allData[date].title;
            await deleteEntryDB(date);
            resultMessage = `Deleted diary entry "${title}" for ${date}.`;
          } else {
            resultMessage = `No diary entry found to delete for ${date}.`;
          }

        } else if (action === 'export_data') {
          const rawData = await exportAllEntries();
          resultMessage = `Here is your raw diary data for backup (copy and save this JSON):\n\n${rawData}`;

        } else if (action === 'wipe_data') {
          await clearAllEntries();
          resultMessage = "All your diary entries have been deleted. Your journal is now empty.";

        } else {
          throw new Error(`Unknown action: ${action}`);
        }

        const response = { result: resultMessage };

        if (showDashboard) {
          response.webview = { url: `dashboard.html?days=${dashboardDays}`, aspectRatio: 1.5 };
        }

        return JSON.stringify(response);

      } catch (e) {
        console.error(e);
        return JSON.stringify({ error: `Diary error: ${e.message}` });
      }
    };
  </script>
</body>
</html>
